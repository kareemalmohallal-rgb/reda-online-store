<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Reda Online</title>

    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header>
    <div class="top_header">
        <div class="container">

            <a href="index.html" class="logo">
                <img src="img/logo.png">
            </a>

            <h3>🛍️ Products</h3>

            <div class="header_icons">

                <div class="icon">
                    <a href="index.html"><i class="fa-solid fa-house"></i></a>
                </div>
                <a href="index.html" class="back_btn">
    ⬅ Home
</a>

                            <div class="cart_button">
    <a href="cart.html" class="cart_link">
        <i class="fa-solid fa-cart-shopping"></i>
        <span>Cart</span>
    </a>

    <span class="count" id="cart_count">0</span>
</div>

            </div>

        </div>
    </div>
</header>

<!-- PRODUCTS -->
<main class="container">

    <section class="products_section">

        <h2>🔥 All Products</h2>
        <div class="search_products">

    <input type="text" id="search_input" placeholder="Search products...">

</div>
        <div class="filter_box">

    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('Electronics')">Electronics</button>
    <button onclick="filterProducts('Fashion')">Fashion</button>
    <button onclick="filterProducts('Phones')">Phones</button>

</div>

        <div class="products_grid" id="products_container">
            <!-- المنتجات بتتولد هنا تلقائي -->
        </div>

    </section>

</main>

<script src="js/product.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>

</body>
</html>
