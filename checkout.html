<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Reda Online</title>

    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<header>
    <div class="top_header">
        <div class="container">

            <a href="index.html" class="logo">
                <img src="img/logo.png">
            </a>

            <h3>💳 Checkout</h3>

            <a href="cart.html">
                <i class="fa-solid fa-cart-shopping"></i>
            </a>
                        <a href="index.html" class="back_btn">
    ⬅ Back to Home
</a>

        </div>
    </div>
</header>

<main class="container checkout_page">

    <h2>Billing Details</h2>

    <form id="checkout_form" class="checkout_form">

        <input type="text" placeholder="Full Name" required>

        <input type="text" placeholder="Phone Number" required>

        <input type="text" placeholder="Address" required>

        <input type="email" placeholder="Email (optional)">

        <button type="submit">Place Order</button>

    </form>

    <div class="order_summary">
        <h3>Order Summary</h3>
        <p>Total Items: <span id="total_items">0</span></p>
        <p>Total Price: $<span id="total_price">0</span></p>
    </div>

</main>

<script src="js/checkout.js"></script>

</body>
</html>
