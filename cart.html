<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Reda Online</title>

    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<header>
    <div class="top_header">
        <div class="container">

            <a href="index.html" class="logo">
                <img src="img/logo.png">
            </a>

            <h3>🧺 Shopping Cart</h3>

            <a href="index.html" style="color:#000;">
                <i class="fa-solid fa-house"></i>
            </a>
            <a href="index.html" class="back_btn">
    ⬅ Back to Home
</a>

        </div>
    </div>
</header>

<main class="container cart_page">

    <h2>Your Shopping Cart</h2>

    <div id="cart_items" class="cart_items"></div>

    <div class="cart_footer">

        <h3>Total: $<span id="total_price">0</span></h3>

        <div class="cart_buttons">
            <button onclick="clearCart()" class="clear_btn">
                Clear Cart
            </button>

<a href="checkout.html" class="checkout_btn">
    Checkout
</a>
        </div>

    </div>

</main>

<script src="js/cart.js"></script>

</body>
</html>
